# =====================================================================
#  analysis_options.yaml
#  Base: flutter_lints (kế thừa lints/core -> lints/recommended -> flutter)
#  Đã thêm rule tự chọn cho stack: freezed + injectable + nhiều stream.
#
#  ⚠️ Sau khi copy, chạy: flutter analyze
#     Nếu báo "unrecognized lint rule" ở dòng nào -> rule đó không tồn tại
#     ở version hiện tại, xóa dòng đó đi. (Xem ghi chú ⚠️ bên dưới.)
# =====================================================================

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"        # File sinh bởi json_serializable, retrofit
    - "**/*.freezed.dart"  # File sinh bởi freezed
    - "**/*.config.dart"   # File sinh bởi injectable
    - "lib/src/rust/**"     # File sinh bởi flutter_rust_bridge_codegen
    - "build/**"           # SwiftPM checkouts và build artifacts

  errors:
    missing_required_param: error     # Thiếu tham số bắt buộc → lỗi đỏ
    # ⚠️ missing_return: có thể đã bị gỡ (null safety biến nó thành lỗi biên
    #    dịch body_might_complete_normally). Giữ lại vô hại nhưng có thể thừa.
    missing_return: error             # Thiếu return trong hàm → lỗi đỏ
    invalid_assignment: error         # Gán sai kiểu → lỗi đỏ
    invalid_annotation_target: ignore # Bỏ qua annotation sai target (codegen freezed/json)
    todo: ignore                      # Bỏ qua TODO để đỡ rối mắt

linter:
  rules:
    # --- STYLE & CONSISTENCY ---
    prefer_single_quotes: true                        # Dùng nháy đơn '' thay vì ""
    prefer_const_constructors: true                   # Ưu tiên const cho widget không đổi
    prefer_const_literals_to_create_immutables: true  # Dùng const cho list/map cố định
    prefer_final_locals: true                         # Biến local nên là final nếu không reassign
    sort_child_properties_last: true                  # Đặt child: cuối cùng trong widget
    sized_box_for_whitespace: true                    # Dùng SizedBox thay Container rỗng
    directives_ordering: true                         # Sắp xếp import theo thứ tự chuẩn
    require_trailing_commas: true                     # Bắt buộc dấu phẩy cuối (dễ đọc, dễ diff)
    use_super_parameters: true                        # super.key thay vì Key? key : super(key: key) — bớt boilerplate
    sort_pub_dependencies: true                       # pubspec.yaml gọn, dễ diff

    # Import: CHỌN 1 TRONG 2, ĐỪNG BẬT CẢ HAI (xung đột nhau).
    always_use_package_imports: true                  # Import theo package: — đường dẫn ổn định khi di chuyển file
    # prefer_relative_imports: true                   # (thay thế) Import tương đối trong lib/

    # --- SAFETY & BUGS ---
    avoid_print: true                          # Cấm print() → dùng logger package thay thế
    unawaited_futures: true                    # Future trong hàm async phải await hoặc unawaited()
    discarded_futures: true                    # Future bị "rơi" ở context non-async — bịt nốt lỗ mà unawaited_futures không bắt
    # ⚠️ avoid_void_async: kiểm tra lại tên rule này — nếu analyze báo lỗi thì xóa.
    avoid_void_async: true                     # Hàm async nên trả Future, không void
    cancel_subscriptions: true                 # StreamSubscription phải cancel khi dispose
    close_sinks: true                          # StreamController phải close khi dispose
    always_declare_return_types: true          # Luôn khai báo kiểu trả về cho hàm
    library_private_types_in_public_api: true  # Không expose kiểu private (_X) ra public API
    use_build_context_synchronously: true      # Check context.mounted sau mỗi await
    avoid_dynamic_calls: true                  # Chặn gọi method trên dynamic — mất type safety